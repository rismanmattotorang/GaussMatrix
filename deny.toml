# cargo-deny configuration — supply-chain CI gate (roadmap Phase 0 / NFR §VIII).
#
# Runs as the `deny` lint target (docker/Dockerfile.cargo.deny) via a full
# `cargo deny check`, alongside the existing `cargo audit` gate. All four checks
# are enforced (validated against the current dependency graph with cargo-deny
# 0.19.8):
#
#   * advisories — security vulnerabilities and yanked crates
#   * sources    — source integrity: only crates.io and the matrix-construct
#                  GitHub org may supply dependencies
#   * licenses   — every dependency must carry an allow-listed license
#   * bans       — surfaces duplicate/wildcard dependencies (advisory, non-fatal)

[graph]
# Check the dependency graph for all targets; supply-chain integrity is
# target-independent.
all-features = false

[advisories]
# RustSec advisory database (same source the cargo-audit gate uses).
db-urls = ["https://github.com/rustsec/advisory-db"]
# Mirrors .cargo/audit.toml so the two gates stay consistent.
ignore = ["RUSTSEC-2024-0436"]
yanked = "deny"

[sources]
# Source integrity: anything outside these is rejected. crates.io is allowed by
# default; every git dependency in this workspace is vendored under the
# matrix-construct org (see the [patch] / git deps in the root Cargo.toml).
unknown-registry = "deny"
unknown-git = "deny"
allow-org = { github = ["matrix-construct"] }

[bans]
# Advisory for now: duplicate versions are common in a large tree and we don't
# want to hard-fail CI on them until they're triaged.
multiple-versions = "warn"
# Path/workspace crates legitimately use wildcard versions.
wildcards = "allow"

[licenses]
# Permissive + weak-copyleft allow-list covering every license currently in the
# dependency graph. A new dependency on a license outside this set fails the
# gate, forcing a deliberate review before it enters the tree.
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "Unlicense",
    "0BSD",
    "CDLA-Permissive-2.0",
    "BlueOak-1.0.0",
]

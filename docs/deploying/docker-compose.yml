# gaussmatrix

services:
    homeserver:
        ### If you already built the gaussmatrix image with 'docker build' or want to use a registry image,
        ### then you are ready to go.
        image: rismanmattotorang/gaussmatrix:latest
        restart: unless-stopped
        ports:
            - 8008:6167
        volumes:
            - db:/var/lib/gaussmatrix
            #- ./gaussmatrix.toml:/etc/gaussmatrix.toml
        environment:
            GAUSSMATRIX_SERVER_NAME: your.server.name # EDIT THIS
            GAUSSMATRIX_DATABASE_PATH: /var/lib/gaussmatrix
            GAUSSMATRIX_PORT: 6167
            GAUSSMATRIX_MAX_REQUEST_SIZE: 20000000 # in bytes, ~20 MB
            GAUSSMATRIX_ALLOW_REGISTRATION: 'true'
            GAUSSMATRIX_REGISTRATION_TOKEN: 'YOUR_TOKEN' # A registration token is required when registration is allowed.
            #GAUSSMATRIX_YES_I_AM_VERY_VERY_SURE_I_WANT_AN_OPEN_REGISTRATION_SERVER_PRONE_TO_ABUSE: 'true'
            GAUSSMATRIX_ALLOW_FEDERATION: 'true'
            GAUSSMATRIX_TRUSTED_SERVERS: '["matrix.org"]'
            #GAUSSMATRIX_LOG: warn,state_res=warn
            GAUSSMATRIX_ADDRESS: 0.0.0.0
            #GAUSSMATRIX_CONFIG: '/etc/gaussmatrix.toml' # Uncomment if you mapped config toml above
    #
    ### Uncomment if you want to use your own Element-Web App.
    ### Note: You need to provide a config.json for Element and you also need a second
    ###       Domain or Subdomain for the communication between Element and gaussmatrix
    ### Config-Docs: https://github.com/vector-im/element-web/blob/develop/docs/config.md
    # element-web:
    #     image: vectorim/element-web:latest
    #     restart: unless-stopped
    #     ports:
    #         - 8009:80
    #     volumes:
    #         - ./element_config.json:/app/config.json
    #     depends_on:
    #         - homeserver

volumes:
    db:
